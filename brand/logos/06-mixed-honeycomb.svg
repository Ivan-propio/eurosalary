<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 140">
  <title>EuroSalary.eu — Mixed Honeycomb (1 standout)</title>
  <!-- Mismo cluster que variant 01 pero: top hex amarillo (highlight), 2 abajo azules, BL solo outline -->
  <g stroke-linejoin="round">
    <!-- BL outline only -->
    <polygon points="40.95,59 60,70 60,92 40.95,103 21.9,92 21.9,70" fill="none" stroke="#003399" stroke-width="3.5"/>
    <!-- BR filled blue -->
    <polygon points="79.05,59 98.1,70 98.1,92 79.05,103 60,92 60,70" fill="#003399"/>
    <!-- Top filled yellow (standout) -->
    <polygon points="60,26 79.05,37 79.05,59 60,70 40.95,59 40.95,37" fill="#FFCC00"/>
  </g>
  <!-- wordmark -->
  <text x="130" y="89" font-family="Inter, -apple-system, Segoe UI, system-ui, sans-serif" font-size="54" font-weight="800" fill="#0A1F44" letter-spacing="-1.6">eurosalary<tspan fill="#FFCC00">.eu</tspan></text>
</svg>
