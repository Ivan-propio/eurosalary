<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 140">
  <title>EuroSalary.eu — Cascade Ascending (data growth)</title>
  <!-- 3 hexagonos flat-top en cascada ascendente, evoca crecimiento de datos -->
  <!-- hex 1 (mas bajo, mas oscuro) -->
  <polygon points="46,100 37,115.59 19,115.59 10,100 19,84.41 37,84.41" fill="#0A1F44"/>
  <!-- hex 2 (medio, EU blue) -->
  <polygon points="78,75 69,90.59 51,90.59 42,75 51,59.41 69,59.41" fill="#003399"/>
  <!-- hex 3 (mas alto, amarillo accent) -->
  <polygon points="110,50 101,65.59 83,65.59 74,50 83,34.41 101,34.41" fill="#FFCC00"/>
  <!-- wordmark -->
  <text x="135" y="89" font-family="Inter, -apple-system, Segoe UI, system-ui, sans-serif" font-size="54" font-weight="800" fill="#0A1F44" letter-spacing="-1.6">eurosalary<tspan fill="#FFCC00">.eu</tspan></text>
</svg>
