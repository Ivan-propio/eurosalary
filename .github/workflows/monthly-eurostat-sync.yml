name: Monthly Eurostat Sync

on:
  schedule:
    - cron: '0 4 1 * *' # 1st of every month at 04:00 UTC
  workflow_dispatch:

env:
  SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
  SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

jobs:
  eurostat-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Sync Eurostat earnings data
        run: node scripts/sync-eurostat.mjs
        env:
          SUPABASE_URL: ${{ env.SUPABASE_URL }}
          SUPABASE_KEY: ${{ env.SUPABASE_KEY }}

      - name: Generate data quality report
        run: node scripts/data-quality-report.mjs
        env:
          SUPABASE_URL: ${{ env.SUPABASE_URL }}
          SUPABASE_KEY: ${{ env.SUPABASE_KEY }}

      - name: Commit updated data files
        run: |
          git config user.name "EuroSalary Bot"
          git config user.email "bot@eurosalary.eu"
          git add src/data/ public/
          git diff --cached --quiet || git commit -m "chore: monthly Eurostat data sync $(date +%Y-%m)"
          git push

      - name: Trigger rebuild
        if: success()
        run: |
          curl -X POST "https://api.cloudflare.com/client/v4/pages/webhooks/deploy_hooks/${{ secrets.CF_DEPLOY_HOOK_ID }}" \
            -H "Content-Type: application/json"
