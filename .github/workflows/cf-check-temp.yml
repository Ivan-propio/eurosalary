name: CF Pages Deploy Check (temp)
on:
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Get CF Pages deployments
        run: |
          curl -s "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CF_ACCOUNT_ID }}/pages/projects/eurosalary/deployments?per_page=5" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json" | \
            python3 -c "
import sys, json
data = json.load(sys.stdin)
for d in data.get('result', [])[:5]:
    print(f\"{d['created_on'][:16]} | {d.get('deployment_trigger',{}).get('type','?')} | {d.get('deployment_trigger',{}).get('metadata',{}).get('branch','?')} | {d['url']}\")
"
