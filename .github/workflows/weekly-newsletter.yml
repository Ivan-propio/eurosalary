name: Weekly Newsletter — Salary Pulse Europe

on:
  schedule:
    - cron: '0 10 * * 2' # Every Tuesday at 10:00 UTC
  workflow_dispatch:

env:
  SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
  SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
  RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}

jobs:
  send-newsletter:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate newsletter content
        run: node scripts/generate-newsletter.mjs
        env:
          SUPABASE_URL: ${{ env.SUPABASE_URL }}
          SUPABASE_KEY: ${{ env.SUPABASE_KEY }}

      - name: Send newsletter via Resend
        run: node scripts/send-newsletter.mjs
        env:
          SUPABASE_URL: ${{ env.SUPABASE_URL }}
          SUPABASE_KEY: ${{ env.SUPABASE_KEY }}
          RESEND_API_KEY: ${{ env.RESEND_API_KEY }}
