name: Weekly Salary Data Refresh

on:
  schedule:
    - cron: '0 6 * * 1' # Every Monday at 06:00 UTC
  workflow_dispatch: # Manual trigger

env:
  SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
  SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

jobs:
  refresh-salary-data:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run salary data refresh
        run: node scripts/refresh-salary-data.mjs
        env:
          SUPABASE_URL: ${{ env.SUPABASE_URL }}
          SUPABASE_KEY: ${{ env.SUPABASE_KEY }}

      - name: Update freshness timestamps
        run: node scripts/update-freshness.mjs

      - name: Trigger Cloudflare Pages rebuild
        if: success()
        run: |
          curl -X POST "https://api.cloudflare.com/client/v4/pages/webhooks/deploy_hooks/${{ secrets.CF_DEPLOY_HOOK_ID }}" \
            -H "Content-Type: application/json"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Weekly salary data refresh failed. Check logs for details."
